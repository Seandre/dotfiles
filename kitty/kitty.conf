# Fonts {{{
# Font family. You can also specify different fonts for the
# bold/italic/bold-italic variants. By default they are derived automatically,
# by the OSes font system. Setting them manually is useful for font families
# that have many weight variants like Book, Medium, Thick, etc. For example:
#
# You can get a list of full family names available on your computer by running
# kitty list-fonts
# The default values shown below rely on your OS to choose an appropriate monospace font family.
# font_family        JetBrainsMono Nerd Font Mono
# bold_font          auto
# italic_font        Operator Mono Bold Italic
# bold_italic_font   auto

# map cmd+1 goto_tab 1
# map cmd+2 goto_tab 2
# map cmd+3 goto_tab 3
# map cmd+4 goto_tab 4
# map cmd+5 goto_tab 5
# map cmd+6 goto_tab 6
# map cmd+7 goto_tab 7
# map cmd+8 goto_tab 8
# map cmd+9 goto_tab 9

# Disable tab-related hotkeys
unmap ctrl+shift+t  # New tab
unmap ctrl+shift+w  # Close tab
unmap ctrl+shift+left  # Switch to the left tab
unmap ctrl+shift+right  # Switch to the right tab
unmap ctrl+tab  # Switch to the next tab
unmap ctrl+shift+tab  # Switch to the previous tab
map cmd+tab ignore
map cmd+t ignore

# New Tmux window
# map ctrl+shift+t send_text all tmux new-window\n
#
# # Close Tmux window
# map ctrl+shift+w send_text all tmux kill-window\n
#
# # Switch to the previous Tmux window
# map ctrl+shift+left send_text all tmux previous-window\n
#
# # Switch to the next Tmux window
# map ctrl+shift+right send_text all tmux next-window\n
#
# # Switch to the next Tmux pane
# map ctrl+tab send_text all tmux select-pane -t :.+\n
#
# # Switch to the previous Tmux pane
# map ctrl+shift+tab send_text all tmux select-pane -t :.-\n

# Font size (in pts)
# NOTE: Do not use odd values as these affect how kitty renders margin
font_size       12 

# background_opacity 0.95
#dynamic_background_opacity yes

hide_window_decorations titlebar-only
window_padding_width 5

enable_audio_bell no
alt_is_meta yes
# Colors
#include ./theme.conf
background_blur 15 
background_opacity 0.6
dynamic_background_opacity yes

macos_option_as_alt yes 

# BEGIN_KITTY_FONTS
font_family      family="SF Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
