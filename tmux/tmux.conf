# ---------- PLUGINS ----------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'thewtex/tmux-mem-cpu-load'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# ---------- PREFIX ----------
# Change prefix from C-b to C-a (or choose something else comfortable)
#unbind C-b
set -g prefix C-b
#bind C-a send-prefix   # Allows pressing C-a twice to literally send Ctrl-A

# ---------- SPLITTING ----------
# Split windows using single key for horizontal / vertical
#bind | split-window -h     # Vertical split
#bind - split-window -v     # Horizontal split

# ---------- PANE NAVIGATION ----------
# Use Vim-style navigation for panes on the home row
#bind h select-pane -L
#bind j select-pane -D
#bind k select-pane -U
#bind l select-pane -R

# Optional: also unbind default arrow key bindings if you like
# unbind -n C-Left
# unbind -n C-Right
# unbind -n C-Up
# unbind -n C-Down

# ---------- PANE RESIZING ----------
# Use Option (Meta) + h/j/k/l for resizing by 5 cells
# Make sure your terminal sends Meta when Option is pressed
# bind -n M-h resize-pane -L 5
# bind -n M-l resize-pane -R 5
# bind -n M-k resize-pane -U 5
# bind -n M-j resize-pane -D 5

# If you'd prefer a prefix-based approach, instead do:
# bind -r h resize-pane -L 5
# bind -r l resize-pane -R 5
# bind -r k resize-pane -U 5
# bind -r j resize-pane -D 5
# (then you'd press <prefix> h to resize left, etc.)

# ---------- WINDOW NAVIGATION ----------
# Quickly switch between windows with Alt+[number]
# By default, tmux binds C-b [0..9]. This unbinds those and rebinds to M-[0..9].
# unbind-key -n C-a
# unbind-key -n C-0
# unbind-key -n C-1
# ...
# If you want Alt+Number:
# bind -n M-0 select-window -t 0
# bind -n M-1 select-window -t 1
# bind -n M-2 select-window -t 2
# bind -n M-3 select-window -t 3
# etc.

# ---------- COPY MODE (VIM-STYLE) ----------
# Use vim key bindings in copy mode.
setw -g mode-keys vi
set -g set-clipboard on
# bind Escape copy-mode   # Press <prefix> + Esc to enter copy mode

# Visual selection with 'v', copy with 'y' or Enter.
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# ---------- RELOAD TMUX CONF ----------
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded!"


# ---------- RESTORE TMUX SESSIONS----------
set -g @resurrect-save 'on'
set -g @resurrect-restore 'on'
set -g @continuum-save-interval '15'
set -g @continuum-boot 'on'
set -g @resurrect-capture-pane-contents 'on'

bind C-s run-shell ~/.tmux/plugins/tmux-resurrect/scripts/save.sh
bind C-r run-shell ~/.tmux/plugins/tmux-resurrect/scripts/restore.sh

# ---------- STYLE IMPROVEMENTS ----------
# Make status bar a bit more minimal and mac-friendly
set -g status-keys vi
set -g status-style 'bg=default, fg=dimgray'

set -g status-interval 5

set -g pane-border-style "fg=white bg=default bold"
set -g pane-active-border-style "fg=brightgreen bg=default bold"

set -g window-status-current-style 'fg=brightwhite bold'
set -g window-status-format "#I:#W"
set -g window-status-current-format "#I:#W"

set -g status-left "\
#{?client_prefix,#[fg=brightgreen bold][PREFIX] #[default],}"
set -g status-right-length '150'
set -g status-right "\
#[fg=grey,bg=default]#(tmux-mem-cpu-load -g 12 -a 1)#[default]\
#{battery_color_fg} #{battery_icon_charge} #{battery_percentage}#[fg=brightwhite,bg=default] \
| %a %b %d %l:%M%p"

# ---------- BATTERY INDICATOR ----------
#set -g @batt_remain_short 'true'
set -g @batt_icon_charge_tier1 '󰂎'
set -g @batt_icon_charge_tier2 '󰁻'
set -g @batt_icon_charge_tier3 '󰁼'
set -g @batt_icon_charge_tier4 '󰁽'
set -g @batt_icon_charge_tier5 '󰁿'
set -g @batt_icon_charge_tier6 '󰂀'
set -g @batt_icon_charge_tier7 '󰂂'
set -g @batt_icon_charge_tier8 '󰁹'
set -g @batt_icon_status_charging '󰚥'
set -g @batt_icon_status_charged '󱟢'

# ---------- MISC ----------
set-option -g allow-passthrough on
set-option -g status "on"

# ---------- MOUSE SUPPORT (OPTIONAL) ----------
# If you’d like basic mouse support for clicking panes/tabs:
#set -g mouse on

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
