# ---------- Core ----------
set -g prefix C-b
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 10
set -g history-limit 50000

# ---------- Terminal ----------
set -g default-terminal "screen-256color"
set -as terminal-overrides ",xterm*:Tc"
set -g set-clipboard on
set -g @copy_command "sh -c '\$HOME/.local/bin/tmux-copy-to-clipboard'"

# ---------- Copy Mode ----------
setw -g mode-keys vi

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "#{@copy_command}"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "#{@copy_command}"

# Smaller scroll steps than half-page jumps
bind -T copy-mode-vi C-u send-keys -N 5 -X scroll-up
bind -T copy-mode-vi C-d send-keys -N 5 -X scroll-down

# ---------- Panes / Windows ----------
bind | split-window -h
bind - split-window -v

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ---------- Status ----------
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=default,fg=#ffffff"

set -g pane-border-style "fg=#504945"
set -g pane-active-border-style "fg=#fabd2f"

set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W* "
set -g window-status-style "bg=default,fg=#928374"
set -g window-status-current-style "bg=default,fg=#ffffff,bold"

set -g message-style "bg=default,fg=#ffffff"
set -g mode-style "bg=default,fg=#fabd2f,bold"

set -g status-left ""
set -g status-right "%Y-%m-%d %H:%M"

# ---------- Reload ----------
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# ---------- Mouse ----------
set -g mouse on
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "#{@copy_command}"
